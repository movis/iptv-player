<!DOCTYPE html>
<html>
<head>
    <title>IPTV Pro - Premium Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mpegts.js/1.7.3/mpegts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root {
            --accent: #ff5e3a; --accent-2: #ff8c5a; --accent-glow: rgba(255,94,58,0.4); --accent-soft: rgba(255,94,58,0.12);
            --bg: #08080c; --surface: #12121a; --surface-2: #1c1c28; --surface-3: #252535;
            --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
            --fg: #f5f5f7; --fg-muted: #8a8a9b; --fg-dim: #5a5a6b;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
        }
        body[data-theme="light"] { --bg: #f4f4f7; --surface: #ffffff; --surface-2: #f0f0f4; --surface-3: #e4e4ea; --border: rgba(0,0,0,0.08); --border-hover: rgba(0,0,0,0.15); --fg: #1c1c28; --fg-muted: #6b6b80; --fg-dim: #9a9aab; --accent-soft: rgba(255,94,58,0.1); }
        body[data-theme="slate"] { --bg: #1e1e2e; --surface: #24243a; --surface-2: #2d2d46; --surface-3: #3a3a55; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--fg); display: flex; height: 100vh; height: 100dvh; overflow: hidden; transition: background 0.3s; -webkit-font-smoothing: antialiased; }
        body::before { content: ''; position: fixed; top: -30%; left: -10%; width: 70%; height: 100%; background: radial-gradient(circle, var(--accent-glow), transparent 60%); filter: blur(100px); z-index: 0; pointer-events: none; opacity: 0.6; }
        body::after { content: ''; position: fixed; bottom: -30%; right: -10%; width: 50%; height: 80%; background: radial-gradient(circle, rgba(120,80,255,0.15), transparent 60%); filter: blur(100px); z-index: 0; pointer-events: none; }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 99; opacity: 0; transition: opacity 0.3s ease; }
        #overlay.active { display: block; opacity: 1; }
        
        #sidebar { width: 360px; background: rgba(18,18,26,0.8); backdrop-filter: blur(30px); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; z-index: 2; flex-shrink: 0; transition: 0.3s; }
        body[data-theme="light"] #sidebar { background: rgba(255,255,255,0.8); }
        .sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px var(--accent-glow); flex-shrink: 0; }
        .logo-text h1 { font-size: 18px; font-weight: 800; line-height: 1.1; }
        .logo-text p { font-size: 10px; color: var(--fg-muted); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; margin-top: 3px; }

        .select-group { position: relative; margin-bottom: 12px; }
        #playlistSelect { width: 100%; padding: 12px 36px 12px 16px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; color: var(--fg); font-family: inherit; font-size: 14px; font-weight: 600; appearance: none; cursor: pointer; outline: none; }
        #playlistSelect:focus { border-color: var(--accent); }
        .select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--fg-muted); pointer-events: none; }
        
        .search-wrap { position: relative; }
        .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--fg-dim); pointer-events: none; }
        #searchInput { width: 100%; padding: 12px 16px 12px 40px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; color: var(--fg); font-family: inherit; font-size: 14px; outline: none; }
        #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
        
        .channel-count { padding: 12px 20px 6px; font-size: 11px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; display: flex; justify-content: space-between; }
        .channel-count span { color: var(--accent); font-weight: 700; }

        .channel-list { flex: 1; overflow-y: auto; padding: 12px; }
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
        
        .channel-group { margin-bottom: 8px; }
        .group-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 700; color: var(--fg-muted); text-transform: uppercase; margin-bottom: 6px; user-select: none; }
        .group-header:hover { background: var(--surface-2); }
        .group-count { background: var(--surface-3); padding: 3px 8px; border-radius: 6px; font-size: 10px; color: var(--fg-dim); }
        .channel-group.collapsed .group-channels { display: none; }
        
        .channel-item { display: flex; align-items: center; padding: 10px 12px; gap: 12px; cursor: pointer; border-radius: 10px; border: 1px solid transparent; position: relative; transition: 0.15s; }
        .channel-item:hover { background: var(--surface); border-color: var(--border-hover); }
        .channel-item.active { background: var(--accent-soft); border-color: rgba(255,94,58,0.3); }
        .channel-item.active::before { content: ''; position: absolute; left: -1px; top: 10px; bottom: 10px; width: 3px; background: var(--accent); border-radius: 0 3px 3px 0; }
        .channel-item.active .channel-name { color: var(--accent); }
        
        .channel-logo-sm { width: 44px; height: 44px; background: #000; border-radius: 8px; object-fit: contain; flex-shrink: 0; border: 1px solid var(--border); padding: 2px; }
        .channel-placeholder-sm { width: 44px; height: 44px; background: linear-gradient(135deg, var(--surface-2), var(--surface-3)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: var(--fg-muted); flex-shrink: 0; border: 1px solid var(--border); }
        .channel-info { flex: 1; min-width: 0; }
        .channel-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-meta { font-size: 11px; color: var(--fg-dim); margin-top: 3px; font-weight: 500; }

        .channel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding-bottom: 10px; }
        .grid-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .grid-card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .grid-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
        .grid-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--surface-3); }
        .grid-card .placeholder-box { width: 100%; aspect-ratio: 2/3; background: linear-gradient(135deg, var(--surface-2), var(--surface-3)); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: var(--fg-dim); }
        .grid-card .grid-info { padding: 10px; }
        .grid-card .grid-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .grid-card .grid-meta { font-size: 10px; color: var(--fg-dim); margin-top: 2px; text-transform: uppercase; }

        .loading { padding: 50px 20px; text-align: center; color: var(--fg-muted); font-size: 14px; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--surface-2); border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #main { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 1; min-width: 0; }
        .topbar { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; background: rgba(18,18,26,0.6); backdrop-filter: blur(20px); z-index: 10; }
        body[data-theme="light"] .topbar { background: rgba(255,255,255,0.6); }
        
        #menuToggle { display: none; background: var(--surface-2); border: 1px solid var(--border); color: var(--fg); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; align-items: center; justify-content: center; flex-shrink: 0; }
        .now-playing { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1; }
        .live-badge { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--accent-soft); border: 1px solid rgba(255,94,58,0.3); border-radius: 8px; font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; flex-shrink: 0; }
        .live-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
        .now-playing-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .icon-btn { background: var(--surface-2); border: 1px solid var(--border); color: var(--fg-muted); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
        
        .video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; min-height: 0; }
        .video-container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; }
        video { width: 100%; max-height: calc(100vh - 180px); background: #000; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); display: block; }
        
        .status-bar { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(18,18,26,0.6); backdrop-filter: blur(20px); }
        body[data-theme="light"] .status-bar { background: rgba(255,255,255,0.6); }
        #status { font-size: 13px; display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--fg-dim); transition: all 0.3s; }
        #status.connecting .status-indicator { background: var(--warning); animation: pulse 1s infinite; }
        #status.playing .status-indicator { background: var(--success); box-shadow: 0 0 8px var(--success); }
        #status.error .status-indicator { background: var(--danger); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #settingsModal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; }
        #settingsModal.active { display: flex; }
        .settings-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 460px; padding: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .settings-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .settings-section { margin-bottom: 24px; }
        .settings-label { font-size: 12px; text-transform: uppercase; color: var(--fg-muted); font-weight: 700; margin-bottom: 12px; display: block; }
        .theme-options { display: flex; gap: 10px; }
        .theme-btn { flex: 1; padding: 12px; background: var(--surface-2); border: 2px solid transparent; border-radius: 10px; cursor: pointer; text-align: center; font-weight: 600; font-size: 13px; transition: 0.2s; }
        .theme-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
        .color-swatches { display: flex; gap: 12px; }
        .swatch { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .swatch.active { border-color: var(--fg); transform: scale(1.1); }
        .layout-options { display: flex; gap: 10px; }
        .layout-btn { flex: 1; padding: 12px; background: var(--surface-2); border: 2px solid transparent; border-radius: 10px; cursor: pointer; text-align: center; font-weight: 600; font-size: 13px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .layout-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

        @media (max-width: 900px) {
            #menuToggle { display: flex; }
            #sidebar { position: fixed; top: 0; left: 0; width: 88vw; max-width: 360px; height: 100dvh; transform: translateX(-100%); transition: transform 0.3s; z-index: 100; box-shadow: 0 0 60px rgba(0,0,0,0.5); }
            #sidebar.open { transform: translateX(0); }
            .topbar { padding: 12px 16px; }
            .video-wrap { padding: 12px; }
            video { border-radius: 12px; max-height: 100%; }
            .status-bar { padding: 10px 16px; }
            .channel-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .grid-card .grid-info { padding: 6px; }
            .grid-card .grid-name { font-size: 11px; }
        }
    </style>
</head>
<body data-theme="midnight">

                        Grid View
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay"></div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 2l-5 5-5-5"/></svg>
                </div>
                <div class="logo-text">
                    <h1>IPTV Pro</h1>
                    <p>Premium Player</p>
                </div>
            </div>
            <div class="select-group">
                <select id="playlistSelect">
                    <option value="https://raw.githubusercontent.com/movis/master-iptv/refs/heads/main/IPTV_001A79B646FC_BG_2025-11-01.m3u">BG IPTV (2025-11)</option>
                    <option value="https://raw.githubusercontent.com/movis/Master-iptv_2/refs/heads/main/IPTV_BULGARIA_24.m3u">Bulgaria 24</option>
                    <option value="https://raw.githubusercontent.com/movis/master-iptv_VOD/refs/heads/main/BG%20VOD%201.m3u">BG VOD (Movies/Series)</option>
                </select>
                <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="search-wrap">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input id="searchInput" type="text" placeholder="Search channels...">

        </div>
        <div class="channel-count" id="channelCount" style="display:none;">

        <div class="channel-list" id="channelList"></div>

    <div id="main">
        <div class="topbar">
            <button id="menuToggle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="now-playing">
                <div class="live-badge"><span class="live-dot"></span> Now Playing</div>
                <div class="now-playing-title" id="nowPlayingTitle"><span style="color:var(--fg-dim)">Select a channel</span></div>
            </div>
            <div class="topbar-actions">
                <button class="icon-btn" id="settingsBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>

                <video id="videoPlayer" controls autoplay playsinline></video>
            </div>

    <script>
        const videoElement = document.getElementById('videoPlayer');
        const statusElement = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const channelList = document.getElementById('channelList');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const searchInput = document.getElementById('searchInput');
        const channelCount = document.getElementById('channelCount');
        const countNumber = document.getElementById('countNumber');
        const playlistName = document.getElementById('playlistName');
        const playlistSelect = document.getElementById('playlistSelect');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menuToggle');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');
        
        let mpegtsPlayer = null;
        let allChannels = [];
        let currentLayout = localStorage.getItem('iptv_layout') || 'list';

        function applySettings() {
            const theme = localStorage.getItem('iptv_theme') || 'midnight';
            const color = localStorage.getItem('iptv_color') || '#ff5e3a';
            const color2 = localStorage.getItem('iptv_color2') || '#ff8c5a';
            document.body.setAttribute('data-theme', theme);
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-2', color2);
            const r = parseInt(color.slice(1, 3), 16), g = parseInt(color.slice(3, 5), 16), b = parseInt(color.slice(5, 7), 16);
            document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.4)`);
            document.documentElement.style.setProperty('--accent-soft', `rgba(${r},${g},${b},0.12)`);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
            document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.color === color));
            document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b.dataset.layout === currentLayout));
        }

        document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', () => { localStorage.setItem('iptv_theme', btn.dataset.theme); applySettings(); }));
        document.querySelectorAll('.swatch').forEach(sw => sw.addEventListener('click', () => { localStorage.setItem('iptv_color', sw.dataset.color); localStorage.setItem('iptv_color2', sw.dataset.color2); applySettings(); }));
        document.querySelectorAll('.layout-btn').forEach(btn => btn.addEventListener('click', () => { currentLayout = btn.dataset.layout; localStorage.setItem('iptv_layout', currentLayout); applySettings(); renderChannels(allChannels); }));

        settingsBtn.addEventListener('click', () => settingsModal.classList.add('active'));
        closeSettings.addEventListener('click', () => settingsModal.classList.remove('active'));
        settingsModal.addEventListener('click', (e) => { if(e.target === settingsModal) settingsModal.classList.remove('active'); });

        function setStatus(state, text) { statusElement.className = state; statusText.textContent = text; }
        function toggleSidebar(open) { if (open) { sidebar.classList.add('open'); overlay.classList.add('active'); } else { sidebar.classList.remove('open'); overlay.classList.remove('active'); } }
        menuToggle.addEventListener('click', () => toggleSidebar(true));
        overlay.addEventListener('click', () => toggleSidebar(false));
        function getInitials(name) { return name.trim().split(/\s+/).slice(0, 2).map(w => w.charAt(0).toUpperCase()).join(''); }

        function loadPlaylist(url) {
            channelList.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';
            searchInput.value = '';
            channelCount.style.display = 'none';
            if (mpegtsPlayer) { mpegtsPlayer.pause(); mpegtsPlayer.unload(); mpegtsPlayer.detachMediaElement(); mpegtsPlayer.destroy(); mpegtsPlayer = null; }
            videoElement.removeAttribute('src'); videoElement.load();
            
            fetch(url).then(r => r.text()).then(data => {
                const lines = data.split('\n');
                let channels = []; let currentChannel = null;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        let name = "Unknown";
                        const commaIndex = lines[i].lastIndexOf(',');
                        if (commaIndex !== -1) name = lines[i].substring(commaIndex + 1).trim();
                        if (!name) { const m = lines[i].match(/tvg-name="([^"]+)"/); if (m) name = m[1].trim(); }
                        const logoMatch = lines[i].match(/tvg-logo="([^"]+)"/);
                        const groupMatch = lines[i].match(/group-title="([^"]+)"/);
                        currentChannel = { name, logo: logoMatch ? logoMatch[1] : '', group: groupMatch ? groupMatch[1] : 'Ungrouped', url: '' };
                    } else if (currentChannel && !lines[i].startsWith('#') && lines[i].trim() !== '') {
                        currentChannel.url = lines[i].trim();
                        channels.push(currentChannel); currentChannel = null;
                    }
                }
                allChannels = channels;
                countNumber.textContent = channels.length;
                playlistName.textContent = playlistSelect.options[playlistSelect.selectedIndex].text;
                channelCount.style.display = 'flex';
                renderChannels(channels);
            }).catch(() => channelList.innerHTML = '<div class="loading">Failed to load. CORS or Network error.</div>');
        }

        function renderChannels(channels) {
            channelList.innerHTML = '';
            if (channels.length === 0) { channelList.innerHTML = '<div class="loading">No channels found.</div>'; return; }
            const groups = {};
            channels.forEach(ch => { const g = ch.group || 'Ungrouped'; if (!groups[g]) groups[g] = []; groups[g].push(ch); });

            Object.keys(groups).sort().forEach(groupName => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'channel-group';
                const header = document.createElement('div');
                header.className = 'group-header';
                header.innerHTML = `<span>${groupName}</span><span class="group-count">${groups[groupName].length}</span>`;
                header.onclick = () => groupDiv.classList.toggle('collapsed');
                const container = document.createElement('div');
                container.className = currentLayout === 'grid' ? 'channel-grid' : 'group-channels';

                groups[groupName].forEach(ch => {
                    let item;
                    // PROXY LOGIC: If image is HTTP, route it through a secure proxy for GitHub Pages
                    let secureLogoUrl = ch.logo;
                    if (secureLogoUrl && secureLogoUrl.startsWith('http://')) {
                        secureLogoUrl = 'https://images.weserv.nl/?url=' + secureLogoUrl.replace('http://', '');
                    }

                    if (currentLayout === 'grid') {
                        item = document.createElement('div');
                        item.className = 'grid-card';
                        item.onclick = () => playChannel(ch.url, item, ch.name);
                        if (secureLogoUrl) {
                            const img = document.createElement('img');
                            img.src = secureLogoUrl; img.onerror = () => { img.outerHTML = `<div class="placeholder-box">${getInitials(ch.name)}</div>`; };
                            item.appendChild(img);
                        } else {
                            item.innerHTML = `<div class="placeholder-box">${getInitials(ch.name)}</div>`;
                        }
                        item.innerHTML += `<div class="grid-info"><div class="grid-name">${ch.name}</div><div class="grid-meta">${ch.group}</div></div>`;
                    } else {
                        item = document.createElement('div');
                        item.className = 'channel-item';
                        item.onclick = () => playChannel(ch.url, item, ch.name);
                        let logoHtml = secureLogoUrl ? 
                            `<img class="channel-logo-sm" src="${secureLogoUrl}" onerror="this.outerHTML='<div class=\\'channel-placeholder-sm\\'>${getInitials(ch.name)}</div>'">` :
                            `<div class="channel-placeholder-sm">${getInitials(ch.name)}</div>`;
                        item.innerHTML = `${logoHtml}<div class="channel-info"><div class="channel-name">${ch.name}</div><div class="channel-meta">${ch.group}</div></div>`;
                    }
                    container.appendChild(item);
                });
                groupDiv.appendChild(header);
                groupDiv.appendChild(container);
                channelList.appendChild(groupDiv);
            });
        }

        playlistSelect.addEventListener('change', (e) => loadPlaylist(e.target.value));
        searchInput.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase().trim();
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(q) || c.group.toLowerCase().includes(q));
            countNumber.textContent = filtered.length;
            renderChannels(filtered);
            document.querySelectorAll('.channel-group').forEach(g => g.classList.remove('collapsed'));
        });

        function playChannel(url, element, name) {
            document.querySelectorAll('.channel-item, .grid-card').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            nowPlayingTitle.textContent = name;
            setStatus('connecting', 'Connecting...');
            if (window.innerWidth <= 900) toggleSidebar(false);

            if (mpegtsPlayer) { mpegtsPlayer.pause(); mpegtsPlayer.unload(); mpegtsPlayer.detachMediaElement(); mpegtsPlayer.destroy(); mpegtsPlayer = null; }
            videoElement.removeAttribute('src'); videoElement.load();

            // If on HTTPS (GitHub Pages), try forcing HTTPS for the video stream
            let finalUrl = url;
            if (window.location.protocol === 'https:' && finalUrl.startsWith('http://')) {
                finalUrl = 'https://' + finalUrl.substring(7);
            }

            const isTs = finalUrl.match(/\.(ts|m3u8)(\?|&|$)/i);
            if (isTs && mpegts.isSupported()) {
                mpegtsPlayer = mpegts.createPlayer({ type: 'mpegts', isLive: true, url: finalUrl });
                mpegtsPlayer.attachMediaElement(videoElement);
                mpegtsPlayer.load(); mpegtsPlayer.play().catch(()=>{});
                mpegtsPlayer.on(mpegts.Events.ERROR, () => setStatus('error', 'Stream blocked or offline. Allow Insecure Content in browser settings.'));
                mpegtsPlayer.on(mpegts.Events.PLAYING, () => setStatus('playing', 'Playing successfully'));
            } else {
                videoElement.src = finalUrl;
                videoElement.load(); videoElement.play().catch(()=>{});
                videoElement.onplaying = () => setStatus('playing', 'Playing successfully');
                videoElement.onerror = () => setStatus('error', 'Stream error. Format may not be supported.');
            }
        }

        applySettings();
        loadPlaylist(playlistSelect.value);
    </script>
</body>
</html>
