<!DOCTYPE html>
<html>
<head>
    <title>BG IPTV Player</title>
    <!-- This library forces the browser to play .ts streams -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mpegts.js/1.7.3/mpegts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Added viewport-fit=cover to support notches on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #14141c;
            --surface-2: #1c1c28;
            --surface-3: #252535;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --fg: #f5f5f7;
            --fg-muted: #8a8a9b;
            --fg-dim: #5a5a6b;
            --accent: #ff5e3a;
            --accent-2: #ff8c5a;
            --accent-glow: rgba(255,94,58,0.4);
            --accent-soft: rgba(255,94,58,0.12);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            height: 100vh;
            height: 100dvh; /* Fix for mobile browser UI */
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -10%;
            width: 70%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,94,58,0.10), transparent 60%);
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }
        
        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -10%;
            width: 50%;
            height: 80%;
            background: radial-gradient(circle, rgba(120,80,255,0.08), transparent 60%);
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }

        /* Mobile Menu Overlay */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 99;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #overlay.active {
            display: block;
            opacity: 1;
        }
        
        /* ============ SIDEBAR ============ */
        #sidebar {
            width: 340px;
            background: rgba(20,20,28,0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }
        
        .sidebar-header {
            padding: 22px 20px 18px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(28,28,40,0.8), rgba(20,20,28,0.4));
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.25);
            position: relative;
            flex-shrink: 0;
        }
        
        .logo-icon::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 8px;
            border: 1.5px solid rgba(255,255,255,0.25);
        }
        
        .logo-text h1 {
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        
        .logo-text p {
            font-size: 10px;
            color: var(--fg-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 2px;
        }

        /* Playlist Selector */
        .playlist-selector {
            position: relative;
            margin-bottom: 12px;
        }

        #playlistSelect {
            width: 100%;
            padding: 12px 36px 12px 14px;
            background: var(--surface-3);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--fg);
            font-family: inherit;
            font-size: 14px; /* 16px+ prevents iOS zoom */
            font-weight: 600;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        #playlistSelect:hover { border-color: var(--border-hover); background: #2f2f40; }
        #playlistSelect:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        #playlistSelect option { background: var(--surface-2); color: var(--fg); font-weight: 500; }

        .select-arrow {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--fg-muted);
            pointer-events: none;
        }
        
        .search-wrap {
            position: relative;
        }
        
        .search-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--fg-dim);
            pointer-events: none;
        }
        
        #searchInput {
            width: 100%;
            padding: 12px 12px 12px 38px;
            background: var(--surface-3);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--fg);
            font-family: inherit;
            font-size: 14px; /* 16px+ prevents iOS zoom */
            outline: none;
            transition: all 0.2s;
        }
        
        #searchInput:focus {
            border-color: var(--accent);
            background: var(--surface-2);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        
        #searchInput::placeholder { color: var(--fg-dim); }
        
        .channel-count {
            padding: 12px 20px 6px;
            font-size: 11px;
            color: var(--fg-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .channel-count span { color: var(--accent); font-weight: 700; }
        
        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px 12px;
            -webkit-overflow-scrolling: touch;
        }
        
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-track { background: transparent; }
        .channel-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
        .channel-list::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }
        
        .channel {
            display: flex;
            align-items: center;
            padding: 10px 11px;
            gap: 11px;
            cursor: pointer;
            border-radius: 10px;
            transition: background 0.15s ease, border-color 0.15s ease;
            margin-bottom: 2px;
            border: 1px solid transparent;
            position: relative;
        }
        
        .channel:hover {
            background: var(--surface-2);
            border-color: var(--border-hover);
        }
        
        .channel.active {
            background: var(--accent-soft);
            border-color: rgba(255,94,58,0.4);
        }
        
        .channel.active::before {
            content: '';
            position: absolute;
            left: -1px;
            top: 8px;
            bottom: 8px;
            width: 3px;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
        }
        
        .channel.active .channel-name { color: var(--accent); }
        
        .channel-logo {
            width: 42px;
            height: 42px;
            background: #000;
            border-radius: 8px;
            object-fit: contain;
            flex-shrink: 0;
            border: 1px solid var(--border);
            padding: 2px;
        }
        
        .channel-logo-placeholder {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--surface-3), var(--surface-2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            color: var(--fg-muted);
            flex-shrink: 0;
            border: 1px solid var(--border);
            letter-spacing: -0.02em;
        }
        
        .channel-info {
            flex: 1;
            min-width: 0;
        }
        
        .channel-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--fg);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.15s;
        }
        
        .channel-meta {
            font-size: 11px;
            color: var(--fg-dim);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .channel.active .channel-meta { color: var(--accent); opacity: 0.8; }
        
        .live-pulse {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.5s infinite;
            display: none;
        }
        
        .channel.active .live-pulse { display: inline-block; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }
        
        /* Loading state */
        .loading {
            padding: 50px 20px;
            text-align: center;
            color: var(--fg-muted);
        }
        
        .spinner {
            width: 38px;
            height: 38px;
            border: 3px solid var(--surface-3);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-msg, .no-results {
            padding: 40px 20px;
            text-align: center;
            color: var(--fg-dim);
            font-size: 13px;
            line-height: 1.5;
        }
        .error-msg { color: var(--danger); }
        
        /* ============ MAIN AREA ============ */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            background: var(--bg);
            min-width: 0;
        }
        
        .topbar {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20,20,28,0.5);
            backdrop-filter: blur(10px);
            gap: 12px;
            min-height: 56px;
        }

        /* Hamburger Menu Button */
        #menuToggle {
            display: none;
            background: var(--surface-3);
            border: 1px solid var(--border);
            color: var(--fg);
            width: 40px;
            height: 40px;
            border-radius: 9px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        #menuToggle:hover, #menuToggle:active {
            background: #33334a;
            border-color: var(--border-hover);
        }
        
        .now-playing {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }
        
        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: var(--accent-soft);
            border: 1px solid rgba(255,94,58,0.35);
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            flex-shrink: 0;
        }
        
        .live-dot {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 8px var(--accent);
        }
        
        .now-playing-title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--fg);
        }
        
        .now-playing-title .muted { color: var(--fg-dim); font-weight: 400; }
        
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 18px;
            color: var(--fg-muted);
            font-size: 12px;
            flex-shrink: 0;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        
        .stat svg { color: var(--fg-dim); }
        
        .video-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            min-height: 0;
        }
        
        .video-container {
            width: 100%;
            max-width: 1200px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        video {
            width: 100%;
            max-height: calc(100vh - 180px);
            background: #000;
            border-radius: 12px;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.6),
                0 0 0 1px var(--border-hover);
            display: block;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            color: var(--fg-muted);
            padding: 40px 20px;
            max-width: 440px;
        }
        
        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--surface-3), var(--surface-2));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .empty-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--accent), transparent);
            z-index: -1;
            opacity: 0.4;
            filter: blur(8px);
        }
        
        .empty-state h2 {
            font-size: 20px;
            color: var(--fg);
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }
        
        .empty-state p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--fg-muted);
        }
        
        /* Status bar */
        .status-bar {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20,20,28,0.6);
            backdrop-filter: blur(10px);
            min-height: 48px;
        }
        
        #status {
            font-size: 13px;
            color: var(--fg-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--fg-dim);
            transition: all 0.3s;
            flex-shrink: 0;
        }
        
        #status.connecting .status-indicator { 
            background: var(--warning); 
            box-shadow: 0 0 8px var(--warning);
            animation: pulse 1s infinite;
        }
        #status.connecting { color: var(--warning); }
        
        #status.playing .status-indicator { 
            background: var(--success); 
            box-shadow: 0 0 8px var(--success);
        }
        #status.playing { color: var(--success); }
        
        #status.error .status-indicator { 
            background: var(--danger); 
            box-shadow: 0 0 8px var(--danger);
        }
        #status.error { color: var(--danger); }
        
        .status-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: var(--fg-dim);
        }
        
        .status-right span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* ============ MOBILE LAYOUT ============ */
        @media (max-width: 900px) {
            /* Show Hamburger */
            #menuToggle { display: flex; }
            
            /* Sidebar becomes Drawer */
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 88vw;
                max-width: 360px;
                height: 100vh;
                height: 100dvh;
                transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 100;
                box-shadow: 0 0 60px rgba(0,0,0,0.5);
            }
            #sidebar.open {
                transform: translateX(0);
            }

            /* Adjust Video Size */
            video {
                max-height: calc(100vh - 160px);
            }
            
            .topbar-right { display: none; }
            .video-wrap { padding: 12px; }

            /* Added safe-area-inset-top to push the menu down away from phone notches */
            .topbar {
                padding-top: calc(16px + env(safe-area-inset-top, 0px));
            }
        }

        @media (max-width: 640px) {
            .topbar { 
                padding: 12px 12px;
                padding-top: calc(16px + env(safe-area-inset-top, 0px)); /* Pushes menu down */
                min-height: 52px; 
                gap: 10px; 
            }
            .video-wrap { padding: 0; background: #000; }
            .video-container { width: 100%; height: 100%; justify-content: center; }
            
            video { 
                border-radius: 0; 
                max-height: 100%; 
                box-shadow: none;
            }
            
            .status-bar { 
                padding: 8px 12px; 
                padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)); /* Fix for iPhone home bar */
            }
            #status { font-size: 12px; }
            .status-right { display: none; }
            
            .empty-state { padding: 20px; }
            .empty-state h2 { font-size: 18px; }
            .empty-state p { font-size: 13px; }
        }

        /* Landscape Mobile Fixes */
        @media (max-height: 500px) and (orientation: landscape) {
            .topbar { 
                min-height: 40px; 
                padding: 6px 12px; 
                padding-top: calc(6px + env(safe-area-inset-top, 0px));
            }
            .logo-text p { display: none; }
            .logo { margin-bottom: 10px; }
            .sidebar-header { padding: 12px 16px; }
            .status-bar { display: none; }
            .video-wrap { padding: 0; }
            video { max-height: calc(100vh - 52px); border-radius: 0; }
            .topbar-right { display: none; }
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="15" rx="2"/>
                        <path d="M17 2l-5 5-5-5"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>BG IPTV</h1>
                    <p>Multi-Playlist Player</p>
                </div>
            </div>

            <div class="playlist-selector">
                <select id="playlistSelect">
                    <option value="https://raw.githubusercontent.com/movis/master-iptv/refs/heads/main/IPTV_001A79B646FC_BG_2025-11-01.m3u">BG IPTV (2025-11)</option>
                    <option value="https://raw.githubusercontent.com/movis/Master-iptv_2/refs/heads/main/IPTV_BULGARIA_24.m3u">Bulgaria 24</option>
                    <option value="https://raw.githubusercontent.com/movis/master-iptv_VOD/refs/heads/main/BG%20VOD%201.m3u">BG VOD (Movies/Series)</option>
                </select>
                <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </div>

            <div class="search-wrap">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input id="searchInput" type="text" placeholder="Search channels...">
            </div>
        </div>
        
        <div class="channel-count" id="channelCount" style="display:none;">
            <span id="playlistName">Channels</span>
            <span id="countNumber">0</span>
        </div>
        
        <div class="channel-list" id="channelList">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading channels...</p>
            </div>
        </div>
    </div>
    
    <div id="main">
        <div class="topbar">
            <button id="menuToggle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="now-playing">
                <div class="live-badge">
                    <span class="live-dot"></span>
                    Now Playing
                </div>
                <div class="now-playing-title" id="nowPlayingTitle">
                    <span class="muted">No channel selected</span>
                </div>
            </div>
            <div class="topbar-right">
                <div class="stat">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
                        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                        <line x1="12" y1="20" x2="12.01" y2="20"/>
                    </svg>
                    HD Stream
                </div>
                <div class="stat">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    mpegts.js
                </div>
            </div>
        </div>
        
        <div class="video-wrap">
            <div class="video-container">
                <video id="videoPlayer" controls autoplay playsinline></video>
            </div>
            <div class="empty-state" id="emptyState" style="display:none;">
                <div class="empty-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="23 7 16 12 23 17 23 7"/>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                    </svg>
                </div>
                <h2>Ready to watch</h2>
                <p>Tap the menu icon in the top left to browse channels and start streaming.</p>
            </div>
        </div>
        
        <div class="status-bar">
            <div id="status">
                <div class="status-indicator"></div>
                <span id="statusText">Select a channel from the list</span>
            </div>
            <div class="status-right">
                <span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    Real-time
                </span>
                <span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    Low latency
                </span>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('videoPlayer');
        const statusElement = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const channelList = document.getElementById('channelList');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const channelCount = document.getElementById('channelCount');
        const countNumber = document.getElementById('countNumber');
        const playlistName = document.getElementById('playlistName');
        const playlistSelect = document.getElementById('playlistSelect');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menuToggle');
        
        let mpegtsPlayer = null;
        let allChannels = [];

        function getInitials(name) {
            const words = name.trim().split(/\s+/).slice(0, 2);
            return words.map(w => w.charAt(0).toUpperCase()).join('');
        }

        function setStatus(state, text) {
            statusElement.className = state;
            statusText.textContent = text;
        }

        // Mobile Menu Logic
        function toggleSidebar(open) {
            if (open === undefined) open = !sidebar.classList.contains('open');
            if (open) {
                sidebar.classList.add('open');
                overlay.classList.add('active');
            } else {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
            }
        }
        menuToggle.addEventListener('click', () => toggleSidebar(true));
        overlay.addEventListener('click', () => toggleSidebar(false));

        function loadPlaylist(url) {
            // Reset UI
            channelList.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading channels...</p></div>';
            searchInput.value = '';
            channelCount.style.display = 'none';
            
            // Reset Video Player
            if (mpegtsPlayer) {
                mpegtsPlayer.pause();
                mpegtsPlayer.unload();
                mpegtsPlayer.detachMediaElement();
                mpegtsPlayer.destroy();
                mpegtsPlayer = null;
            }
            videoElement.style.display = 'none';
            emptyState.style.display = 'block';
            nowPlayingTitle.innerHTML = '<span class="muted">No channel selected</span>';
            setStatus('', 'Select a channel from the list');

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Network response failed');
                    return response.text();
                })
                .then(data => {
                    const lines = data.split('\n');
                    let channels = [];
                    let currentChannel = null;

                    for (let i = 0; i < lines.length; i++) {
                        if (lines[i].startsWith('#EXTINF')) {
                            let name = "Unknown Channel";
                            
                            // Split by the LAST comma to prevent breaking if logo URL contains commas
                            const commaIndex = lines[i].lastIndexOf(',');
                            if (commaIndex !== -1) {
                                name = lines[i].substring(commaIndex + 1).trim();
                            }
                            
                            // Fallback if comma split failed or was empty
                            if (!name) {
                                const nameAttr = lines[i].match(/tvg-name="([^"]+)"/);
                                if (nameAttr) name = nameAttr[1].trim();
                            }

                            const logoMatch = lines[i].match(/tvg-logo="([^"]+)"/);
                            const groupMatch = lines[i].match(/group-title="([^"]+)"/);
                            
                            currentChannel = {
                                name: name,
                                logo: logoMatch ? logoMatch[1] : '',
                                group: groupMatch ? groupMatch[1] : 'Video',
                                url: ''
                            };
                        } else if (currentChannel && !lines[i].startsWith('#') && lines[i].trim() !== '') {
                            currentChannel.url = lines[i].trim();
                            channels.push(currentChannel);
                            currentChannel = null;
                        }
                    }
                    
                    allChannels = channels;
                    countNumber.textContent = channels.length;
                    playlistName.textContent = playlistSelect.options[playlistSelect.selectedIndex].text;
                    channelCount.style.display = 'flex';
                    
                    renderChannels(channels);
                    
                    if (channels.length === 0) {
                        channelList.innerHTML = '<div class="no-results">No channels found in playlist.</div>';
                    }
                })
                .catch(err => {
                    channelList.innerHTML = `<div class="error-msg">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:10px;">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <br>Failed to load M3U playlist.<br>Please check your internet connection.
                    </div>`;
                });
        }

        function renderChannels(channels) {
            channelList.innerHTML = '';
            
            if (channels.length === 0) {
                channelList.innerHTML = '<div class="no-results">No channels match your search.</div>';
                return;
            }
            
            channels.forEach((ch) => {
                const div = document.createElement('div');
                div.className = 'channel';
                div.onclick = () => playChannel(ch.url, div, ch.name);
                
                const logoHtml = ch.logo 
                    ? `<img class="channel-logo" src="${ch.logo}" onerror="this.outerHTML='<div class=\\'channel-logo-placeholder\\'>${getInitials(ch.name)}</div>'">`
                    : `<div class="channel-logo-placeholder">${getInitials(ch.name)}</div>`;
                
                div.innerHTML = `
                    ${logoHtml}
                    <div class="channel-info">
                        <div class="channel-name">${ch.name}</div>
                        <div class="channel-meta">
                            <span>${ch.group}</span>
                            <span class="live-pulse"></span>
                        </div>
                    </div>
                `;
                channelList.appendChild(div);
            });
        }

        // Event Listeners
        playlistSelect.addEventListener('change', (e) => {
            loadPlaylist(e.target.value);
        });

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                renderChannels(allChannels);
                countNumber.textContent = allChannels.length;
                return;
            }
            const filtered = allChannels.filter(ch => 
                ch.name.toLowerCase().includes(query) || 
                (ch.group && ch.group.toLowerCase().includes(query))
            );
            countNumber.textContent = filtered.length;
            renderChannels(filtered);
        });

        function playChannel(url, element, name) {
            document.querySelectorAll('.channel').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            nowPlayingTitle.textContent = name;
            emptyState.style.display = 'none';
            videoElement.style.display = 'block';
            
            setStatus('connecting', 'Connecting to stream...');

            if (window.innerWidth <= 900) toggleSidebar(false);

            // Destroy previous mpegts.js instance
            if (mpegtsPlayer) {
                mpegtsPlayer.pause();
                mpegtsPlayer.unload();
                mpegtsPlayer.detachMediaElement();
                mpegtsPlayer.destroy();
                mpegtsPlayer = null;
            }

            // Destroy native HTML5 player states
            videoElement.removeAttribute('src');
            videoElement.load();
            videoElement.onplaying = null;
            videoElement.onerror = null;
            videoElement.onended = null;
            videoElement.onwaiting = null;

            // FIX: Force HTTPS to bypass Mixed Content blocking
            let finalUrl = url;
            if (window.location.protocol === 'https:' && finalUrl.startsWith('http://')) {
                finalUrl = 'https://' + finalUrl.substring(7);
            }

            // Determine stream format
            const formatMatch = finalUrl.match(/\.(ts|m3u8|mp4|mkv|webm|mov|avi)(\?|&|$)/i);
            const format = formatMatch ? formatMatch[1].toLowerCase() : null;
            const isLiveTsStream = format === 'ts' || format === 'm3u8';

            if (isLiveTsStream && mpegts.isSupported()) {
                // Use mpegts.js for .ts and .m3u8 streams
                mpegtsPlayer = mpegts.createPlayer({
                    type: 'mpegts',
                    isLive: true,
                    url: finalUrl // Use the HTTPS url
                });
                
                mpegtsPlayer.attachMediaElement(videoElement);
                mpegtsPlayer.load();
                mpegtsPlayer.play().catch(() => {});
                
                mpegtsPlayer.on(mpegts.Events.ERROR, function(errorType, detail) {
                    setStatus('error', `Stream error: ${detail} — CORS or offline`);
                });
                mpegtsPlayer.on(mpegts.Events.PLAYING, function() {
                    setStatus('playing', 'Playing successfully');
                });
                mpegtsPlayer.on(mpegts.Events.LOADING_COMPLETE, function() {
                    setStatus('', 'Stream ended.');
                });
            } else {
                // Use native HTML5 video player for .mp4, .mkv, etc.
                videoElement.src = finalUrl; // Use the HTTPS url
                videoElement.load();
                videoElement.play().catch(err => {
                    setStatus('error', `Playback error: ${err.message || 'Format may not be supported'}`);
                });
                
                videoElement.onplaying = () => setStatus('playing', 'Playing successfully');
                videoElement.onerror = () => setStatus('error', 'Stream error: CORS blocked or offline');
                videoElement.onended = () => setStatus('', 'Playback ended.');
                videoElement.onwaiting = () => setStatus('connecting', 'Buffering...');
            }
        }
        
        // Initial load
        videoElement.style.display = 'none';
        loadPlaylist(playlistSelect.value);
    </script>
</body>
</html>
