<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <!-- FIX: Loaded locally to prevent Tracking Prevention errors. Save hls.min.js in the same folder! -->
    <script src="hls.min.js"></script>
    <style>
        :root {
            --bg-main: #0a0a0f;
            --bg-surface: #14141b;
            --bg-surface-hover: #1c1c25;
            --bg-elevated: #1a1a23;
            --border-color: #2a2a35;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent-primary: #e50914;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --accent-warning: #f59e0b;
            --accent-info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-primary); 
            min-height: 100vh; 
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #33334d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444466; }

        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top right, #1a1a2e, #0a0a0f); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-overlay.hidden { display: none; }
        .login-box { background: rgba(20, 20, 27, 0.8); backdrop-filter: blur(12px); padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 400px; border: 1px solid var(--border-color); }
        .login-box h1 { text-align: center; margin-bottom: 30px; font-size: 28px; font-weight: 800; background: linear-gradient(45deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-primary); font-size: 16px; outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.2); }
        .login-btn { width: 100%; padding: 15px; background: var(--accent-primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .login-btn:hover { background: #ff1a25; transform: translateY(-2px); }
        .login-msg { text-align: center; margin-top: 15px; font-size: 14px; height: 20px; color: var(--accent-danger); }

        .player-wrapper { display: none; height: 100vh; }
        .player-wrapper.show { display: flex; flex-direction: column; }
        
        .header { background: var(--bg-surface); padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; gap: 15px; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header h1 { font-size: 20px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
        
        .header-btn { padding: 8px 16px; background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .header-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); border-color: #444466; }
        
        .logout-btn { padding: 8px 16px; background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .logout-btn:hover { border-color: var(--accent-danger); color: var(--accent-danger); }
        
        .main { display: flex; flex: 1; overflow: hidden; }
        
        #listContainer { background: var(--bg-main); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
        .search-box { padding: 15px; border-bottom: 1px solid var(--border-color); background: var(--bg-surface); }
        .search-box select { width: 100%; padding: 12px; background: var(--bg-elevated); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 14px; outline: none; margin-bottom: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .search-box select:hover { border-color: #444466; }
        .search-box select option { background: var(--bg-elevated); }
        .search-box input { width: 100%; padding: 12px 15px; background: var(--bg-elevated); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 14px; outline: none; transition: 0.2s; }
        .search-box input:focus { border-color: var(--accent-info); }
        
        #channelList { flex: 1; overflow-y: auto; padding: 10px; }
        
        .channel-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; font-size: 14px; color: var(--text-primary); background: transparent; border: 1px solid transparent; transition: 0.15s; }
        .channel-item:hover { background: var(--bg-surface); border-color: var(--border-color); }
        .channel-item.active { background: rgba(229, 9, 20, 0.15); border-color: var(--accent-primary); }
        .channel-item img.ch-logo { width: 40px; height: 40px; object-fit: contain; background: #000; border-radius: 6px; flex-shrink: 0; padding: 2px; }
        .channel-item span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        
        .vod-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; background: transparent; border: 1px solid transparent; transition: 0.15s; }
        .vod-item:hover { background: var(--bg-surface); border-color: var(--border-color); }
        .vod-item.active { background: rgba(229, 9, 20, 0.15); border-color: var(--accent-primary); }
        .vod-item img.vod-poster { width: 40px; height: 60px; object-fit: cover; border-radius: 4px; background: #000; flex-shrink: 0; }
        .vod-item-info { flex: 1; overflow: hidden; }
        .vod-item-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .vod-item-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

        .player-area { background: #000; position: relative; display: flex; flex-direction: column; overflow: hidden; } 
        .video-wrapper { flex: 1; min-height: 0; position: relative; background: #000; display: flex; }
        video { width: 100%; height: 100%; background: #000; outline: none; object-fit: contain; }
        
        .video-title-overlay { position: absolute; top: 0; left: 0; right: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); padding: 25px; font-size: 20px; font-weight: 700; color: #fff; z-index: 10; pointer-events: none; display: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .video-title-overlay.show { display: block; }
        
        .placeholder { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #333; z-index: 5; }
        .placeholder .icon { font-size: 60px; margin-bottom: 15px; }
        .loading { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; z-index: 5; }
        .loading.show { display: block; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; background: var(--bg-surface); padding: 25px; border-radius: 12px; border: 1px solid var(--accent-danger); z-index: 5; }
        .error-msg.show { display: block; }
        .error-msg h3 { color: var(--accent-danger); margin-bottom: 10px; font-size: 18px; }
        .error-msg p { color: var(--text-secondary); font-size: 14px; }
        
        .now-playing { height: 60px; flex-shrink: 0; padding: 0 25px; background: var(--bg-surface); border-top: 1px solid var(--border-color); font-size: 14px; color: var(--text-secondary); display: flex; align-items: center; gap: 15px; font-weight: 500; }
        .dot { width: 10px; height: 10px; background: #444; border-radius: 50%; transition: 0.3s; }
        .dot.live { background: var(--accent-danger); animation: pulse 1.5s infinite; box-shadow: 0 0 10px var(--accent-danger); }
        @keyframes pulse { 0%,100%{opacity:1; transform: scale(1)} 50%{opacity:0.5; transform: scale(1.2)} }

        .loading-msg { text-align:center; padding:60px 20px; color:var(--text-secondary); font-size: 15px; font-weight: 500; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 10000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal-content { background: var(--bg-surface); padding: 30px; border-radius: 16px; max-width: 800px; width: 90%; display: flex; gap: 30px; border: 1px solid var(--border-color); box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .modal-poster { width: 200px; height: 300px; object-fit: cover; border-radius: 12px; background: #000; flex-shrink: 0; }
        .modal-info { flex: 1; }
        .modal-title { font-size: 28px; font-weight: 800; margin-bottom: 15px; color: var(--text-primary); }
        .modal-meta { color: var(--accent-warning); margin-bottom: 20px; font-size: 16px; font-weight: 600; display: inline-block; background: rgba(245, 158, 11, 0.1); padding: 5px 12px; border-radius: 20px; }
        .modal-summary { color: var(--text-secondary); line-height: 1.7; font-size: 15px; }
        .modal-close { position: absolute; top: 25px; right: 35px; color: #fff; font-size: 32px; cursor: pointer; transition: 0.2s; opacity: 0.7; }
        .modal-close:hover { opacity: 1; transform: rotate(90deg); }

        /* LAYOUTS */
        .layout-left .main { flex-direction: row; }
        .layout-left #listContainer { width: 400px; height: 100%; border-right: 1px solid var(--border-color); border-bottom: none; }
        .layout-left .player-area { flex: 1; min-width: 400px; }

        .layout-right .main { flex-direction: row-reverse; }
        .layout-right #listContainer { width: 400px; height: 100%; border-left: 1px solid var(--border-color); border-right: none; border-bottom: none; }
        .layout-right .player-area { flex: 1; min-width: 400px; }

        .layout-theater .main { flex-direction: column; }
        .layout-theater .player-area { width: 100%; height: 60%; min-width: 100%; border-bottom: 1px solid var(--border-color); }
        .layout-theater #listContainer { width: 100%; height: 40%; border-right: none; border-bottom: none; }
    </style>
</head>
<body class="layout-left">

    <div class="login-overlay" id="loginScreen">
        <div class="login-box">
            <h1>📺 IPTV</h1>
            <div class="input-group"><input type="text" id="loginUser" placeholder="Username" autocomplete="off"></div>
            <div class="input-group"><input type="password" id="loginPass" placeholder="Password"></div>
            <button class="login-btn" onclick="userLogin()">Login to Watch</button>
            <div class="login-msg" id="loginMsg"></div>
        </div>
    </div>

    <div class="player-wrapper" id="playerWrapper">
        <div class="header">
            <div class="header-left">
                <h1>📺 IPTV Player</h1>
                <button class="header-btn" id="layoutBtn" onclick="toggleLayout()">⬅️ Left List</button>
            </div>
            <button class="logout-btn" onclick="userLogout()">Logout</button>
        </div>
        
        <div class="main">
            <div id="listContainer">
                <div class="search-box">
                    <select id="serverSelect" onchange="loadChannels()">
                        <option value="" disabled selected>Select a Server...</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Search..." oninput="handleSearch(this.value)">
                </div>
                <div id="channelList">
                    <div class="loading-msg">Please select a server above to view channels.</div>
                </div>
            </div>
            
            <div id="playerArea" class="player-area">
                <div class="video-wrapper">
                    <div id="videoTitleOverlay" class="video-title-overlay"></div>
                    <video id="videoPlayer" controls autoplay preload="auto"></video>
                    <div class="placeholder" id="placeholder"><div class="icon">▶</div><p>Select a channel or movie</p></div>
                    <div class="loading" id="loading"><div class="spinner"></div><p style="color:#888">Connecting...</p></div>
                    <div class="error-msg" id="errorMsg"><h3>Error</h3><p id="errorText"></p></div>
                </div>
                <div class="now-playing">
                    <div class="dot" id="statusDot"></div>
                    <span id="nowPlaying">No channel selected</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="movieModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img id="modalPoster" src="" class="modal-poster" alt="Poster">
            <div class="modal-info">
                <div id="modalTitle" class="modal-title"></div>
                <div id="modalMeta" class="modal-meta"></div>
                <div id="modalSummary" class="modal-summary"></div>
            </div>
        </div>
    </div>

    <script>
        const tmdbCache = {}; 
        let userToken = sessionStorage.getItem('user_token');
        let currentServerType = 'live';
        let currentServerName = 'Unknown';
        let channels = [];
        let filteredChannels = [];
        let currentIndex = -1;
        let renderLimit = 40;
        let currentRetryCount = 0;
        const maxRetries = 10;

        let currentLayout = localStorage.getItem('player_layout') || 'layout-left';
        applyLayout();

        const video = document.getElementById('videoPlayer');
        const listContainer = document.getElementById('listContainer');
        const listEl = document.getElementById('channelList');
        const playerArea = document.getElementById('playerArea');
        const videoTitleOverlay = document.getElementById('videoTitleOverlay');
        const serverSelect = document.getElementById('serverSelect');
        const movieModal = document.getElementById('movieModal');
        
        const placeholderImg = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI2MCIgdmlld0JveD0iMCAwIDQwIDYwIiBmaWxsPSJub25lIj48cmVjdCB3aWR0aD0iNDAiIGhlaWdodD0iNjAiIGZpbGw9IiMxMTEiLz48L3N2Zz4=';

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return str.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function applyLayout() {
            document.body.className = currentLayout;
            const btn = document.getElementById('layoutBtn');
            if (!btn) return;
            if (currentLayout === 'layout-left') btn.innerText = '⬅️ Left List';
            else if (currentLayout === 'layout-right') btn.innerText = '➡️ Right List';
            else if (currentLayout === 'layout-theater') btn.innerText = '🎬 Theater';
        }

        function toggleLayout() {
            if (currentLayout === 'layout-left') currentLayout = 'layout-right';
            else if (currentLayout === 'layout-right') currentLayout = 'layout-theater';
            else currentLayout = 'layout-left';
            localStorage.setItem('player_layout', currentLayout);
            applyLayout();
        }

        if (userToken) { showPlayer(); }

        async function userLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            const msgEl = document.getElementById('loginMsg');
            msgEl.innerText = 'Logging in...';
            try {
                const res = await fetch('/api/user-login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
                const data = await res.json();
                if (res.ok) { userToken = data.token; sessionStorage.setItem('user_token', userToken); showPlayer(); }
                else { msgEl.innerText = data.error || 'Login failed'; }
            } catch (e) { msgEl.innerText = 'Connection error'; }
        }

        function showPlayer() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('playerWrapper').classList.add('show');
            listEl.innerHTML = `<div class="loading-msg">Please select a server above to view channels.</div>`;
            loadServers();
        }

        function userLogout() {
            sessionStorage.removeItem('user_token'); userToken = null; stopPlayback();
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('playerWrapper').classList.remove('show');
        }

        function handle401(res) { if (res.status === 401) { userLogout(); throw new Error('Unauthorized'); } return res; }
        function addToken(url) { return `${url}${url.includes('?') ? '&' : '?'}token=${userToken}`; }

        let searchTimeout;
        function handleSearch(query) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                if (channels.length === 0) return;
                const q = query.toLowerCase();
                filteredChannels = channels.filter(ch => ch.name.toLowerCase().includes(q) || (ch.group && ch.group.toLowerCase().includes(q)));
                renderLimit = 40;
                renderChannels();
                if(currentServerType === 'vod') fetchTmdbData();
            }, 250);
        }

        listEl.addEventListener('scroll', () => {
            if (listEl.scrollTop + listEl.clientHeight >= listEl.scrollHeight - 300) {
                if (filteredChannels.length > renderLimit) {
                    renderLimit += 40;
                    renderChannels();
                    if (currentServerType === 'vod') fetchTmdbData();
                }
            }
        });

        async function loadServers() {
            try {
                const res = await fetch('/api/player-servers', { headers: { 'Authorization': `Bearer ${userToken}` } });
                handle401(res);
                if (!res.ok) return;
                const servers = await res.json();
                
                const previousSelection = serverSelect.value;
                let html = '<option value="" disabled>Select a Server...</option>';
                
                servers.forEach(s => {
                    let color = '#10b981'; // Green for Free
                    let prefix = '🟢';
                    
                    if (s.busy && s.mine) {
                        color = '#f59e0b'; // Yellow for You are here
                        prefix = '🟡';
                    } else if (s.busy) {
                        color = '#ef4444'; // Red for Busy
                        prefix = '🔴';
                    }
                    
                    html += `<option value="${s.id}" style="color: ${color};" data-type="${s.type}">${prefix} ${escapeHtml(s.name)}</option>`;
                });
                
                serverSelect.innerHTML = html;
                
                // Preserve the user's selection if the server is still available
                if (previousSelection && servers.some(s => s.id === previousSelection)) {
                    serverSelect.value = previousSelection;
                }
                
                // Auto-refresh server list every 10 seconds to update colors in real-time
                clearTimeout(window.serverRefreshTimer);
                window.serverRefreshTimer = setTimeout(loadServers, 10000);
                
            } catch(e) {
                console.error("Load servers error:", e);
            }
        }

        async function loadChannels() {
            if (!userToken) { userLogout(); return; }
            const selectedOpt = serverSelect.options[serverSelect.selectedIndex];
            if (!selectedOpt || !selectedOpt.value) return;
            
            const serverId = serverSelect.value;
            currentServerType = selectedOpt.dataset.type;
            // Strip emoji prefixes for a clean server name to send to the backend
            currentServerName = selectedOpt.innerText.replace(/🟢|🟡|🔴\s/g, '').trim();
            
            stopPlayback();
            listEl.innerHTML = `<div class="loading-msg">Loading...</div>`;
            try {
                const res = await fetch(addToken(`/load?server_id=${serverId}`)).then(handle401);
                if (!res.ok) throw new Error(`Server returned ${res.status}`);
                channels = await res.json();
                
                if (channels.length === 0) {
                    listEl.innerHTML = `<div class="loading-msg" style="color:var(--accent-danger);">Playlist is empty. Ask admin to sync content.</div>`;
                    return;
                }
                filteredChannels = [...channels];
                // Assign _idx because backend doesn't provide it
                filteredChannels.forEach((item, i) => item._idx = i);
                
                renderLimit = 40;
                renderChannels();
                if (currentServerType === 'vod') fetchTmdbData();
            } catch (e) { 
                console.error("Playlist load failed:", e); 
                listEl.innerHTML = `<div class="loading-msg" style="color:var(--accent-danger);">Error loading playlist.<br>Please logout and login.</div>`;
            }
        }

        function cleanTitle(name) {
            if (!name) return '';
            return name.replace(/\(.*?\)/g, '')
                       .replace(/\b(BG|HD|4K|1080p|720p|H.265|HEVC|AC3|5.1|WEB-DL|REMUX|VOD|TS|HDTV|X264|X265)\b/gi, '')
                       .replace(/\s+/g, ' ')
                       .trim();
        }

        async function fetchTmdbData() {
            const cards = document.querySelectorAll('.vod-item:not([data-tmdb-loaded="true"])');
            for (let card of cards) {
                card.setAttribute('data-tmdb-loaded', 'true');
                const chIdx = parseInt(card.getAttribute('data-idx'), 10);
                const channel = channels[chIdx];
                if (!channel) continue;
                
                const cleanName = cleanTitle(channel.name);
                if (tmdbCache[cleanName]) {
                    updateCardUI(card, tmdbCache[cleanName]);
                    continue;
                }

                try {
                    const res = await fetch(`/tmdb?title=${encodeURIComponent(cleanName)}`);
                    if (!res.ok) throw new Error('TMDB Network error');
                    const data = await res.json();
                    if (data && data.results && data.results.length > 0) {
                        tmdbCache[cleanName] = data.results[0];
                        updateCardUI(card, data.results[0]);
                    } else {
                        updateCardUI(card, {});
                    }
                } catch (e) {
                    console.error("TMDB fetch error for", cleanName, e);
                    updateCardUI(card, {});
                }
                await new Promise(r => setTimeout(r, 50)); 
            }
        }

        function updateCardUI(card, movie) {
            const chIdx = parseInt(card.getAttribute('data-idx'), 10);
            const channel = channels[chIdx];
            const img = card.querySelector('img.vod-poster');
            const metaEl = card.querySelector('.vod-item-meta');

            if (img) {
                img.src = movie.poster_proxy || (channel && channel.logo) || placeholderImg;
                img.onerror = function() { this.onerror = null; this.src = placeholderImg; };
            }
            
            if (metaEl) {
                if (movie && movie.vote_average) {
                    metaEl.innerText = `⭐ ${movie.vote_average.toFixed(1)} | ${movie.release_date ? movie.release_date.substring(0, 4) : ''}`;
                } else {
                    metaEl.innerText = 'Няма данни';
                }
            }
        }

        async function showMovieDetails(e, index) {
            if (e) e.preventDefault();
            const channel = channels[index];
            if (!channel) return;
            
            const cleanName = cleanTitle(channel.name);
            const movie = tmdbCache[cleanName] || {};
            
            document.getElementById('modalTitle').innerText = channel.name;
            document.getElementById('modalSummary').innerText = movie.overview || 'Няма налично резюме за този филм.';
            
            const poster = document.getElementById('modalPoster');
            if (movie.poster_proxy) {
                poster.src = movie.poster_proxy;
                poster.style.display = 'block';
                poster.onerror = function() { this.onerror = null; this.style.display = 'none'; };
            } else if (channel.logo) {
                poster.src = channel.logo;
                poster.style.display = 'block';
                poster.onerror = function() { this.onerror = null; this.style.display = 'none'; };
            } else {
                poster.style.display = 'none';
            }
            
            document.getElementById('modalMeta').innerText = movie.vote_average ? `⭐ ${movie.vote_average.toFixed(1)} | ${movie.release_date ? movie.release_date.substring(0, 4) : ''}` : 'Няма налична оценка.';
            
            movieModal.style.display = 'flex';
        }

        function closeModal() {
            movieModal.style.display = 'none';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        function renderChannels() {
            listEl.innerHTML = filteredChannels.slice(0, renderLimit).map((ch) => {
                const realIndex = ch._idx;
                if (ch.type === 'live') {
                    const logoHtml = ch.logo ? `<img src="${escapeHtml(ch.logo)}" class="ch-logo" onerror="this.style.display='none'">` : '';
                    return `<div class="channel-item" onclick="playChannel(${realIndex})" oncontextmenu="showMovieDetails(event, ${realIndex}); return false;">
                        ${logoHtml}
                        <span>${escapeHtml(ch.name)}</span>
                    </div>`;
                } else {
                    return `<div class="vod-item" data-idx="${realIndex}" onclick="playChannel(${realIndex})" oncontextmenu="showMovieDetails(event, ${realIndex}); return false;">
                        <img src="${placeholderImg}" class="vod-poster" alt="${escapeHtml(ch.name)}" onerror="this.onerror=null;this.src='${placeholderImg}';">
                        <div class="vod-item-info">
                            <div class="vod-item-title">${escapeHtml(ch.name)} <span style="cursor:pointer; color:#38bdf8; font-size:12px; font-weight:bold;" onclick="event.stopPropagation(); showMovieDetails(event, ${realIndex});">ℹ️</span></div>
                            <div class="vod-item-meta">Зареждане...</div>
                        </div>
                    </div>`;
                }
            }).join('');
        }

        function stopPlayback() {
            if (window.hlsPlayer) { window.hlsPlayer.destroy(); window.hlsPlayer = null; }
            video.pause(); 
            video.removeAttribute('src'); 
            video.load();
            
            video.onplaying = null;
            video.onerror = null;
            
            document.getElementById('placeholder').style.display = '';
            document.getElementById('loading').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('statusDot').className = 'dot';
            document.getElementById('nowPlaying').textContent = 'No channel selected';
            
            videoTitleOverlay.classList.remove('show');
            videoTitleOverlay.innerText = '';
            
            document.querySelectorAll('.channel-item, .vod-item').forEach(el => el.classList.remove('active'));
            currentIndex = -1;
        }

        async function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            const channel = channels[index];
            currentIndex = index;

            if (window.hlsPlayer) { window.hlsPlayer.destroy(); window.hlsPlayer = null; }

            currentRetryCount = 0;
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('loading').classList.add('show');
            document.getElementById('statusDot').className = 'dot';
            document.getElementById('nowPlaying').textContent = channel.name;
            
            videoTitleOverlay.innerText = channel.name;
            videoTitleOverlay.classList.add('show');
            
            document.querySelectorAll('.channel-item, .vod-item').forEach(el => el.classList.remove('active'));
            const filteredIndex = filteredChannels.findIndex(c => c._idx === index);
            const items = document.querySelectorAll('.channel-item, .vod-item');
            if (filteredIndex >= 0 && items[filteredIndex]) {
                items[filteredIndex].classList.add('active');
                items[filteredIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            try {
                const isM3u8 = channel.url.toLowerCase().includes('.m3u8');
                let playUrl;
                const srvNameParam = `&srv_name=${encodeURIComponent(currentServerName)}`;

                if (currentServerType === 'vod') {
                    // Force ALL VODs to transcode to fix audio-only/codec issues
                    playUrl = addToken(`/transcode?url=${encodeURIComponent(channel.url)}${srvNameParam}`);
                    video.src = playUrl;
                    video.play().catch(()=>{});
                } else if (isM3u8) {
                    // Live TV HLS (Zero CPU)
                    playUrl = addToken(`/proxy?url=${encodeURIComponent(channel.url)}${srvNameParam}`);
                    if (Hls.isSupported()) {
                        window.hlsPlayer = new Hls();
                        window.hlsPlayer.loadSource(playUrl);
                        window.hlsPlayer.attachMedia(video);
                        window.hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = playUrl; video.play().catch(()=>{});
                    }
                } else {
                    // Live TV TS
                    playUrl = addToken(`/liveproxy?url=${encodeURIComponent(channel.url)}${srvNameParam}`);
                    video.src = playUrl;
                    video.play().catch(()=>{});
                }
                
                video.onplaying = () => {
                    currentRetryCount = 0;
                    document.getElementById('loading').classList.remove('show');
                    document.getElementById('statusDot').className = 'dot live';
                };
                
                video.onerror = () => {
                    if (currentRetryCount < maxRetries) {
                        currentRetryCount++;
                        document.getElementById('loading').classList.add('show');
                        document.getElementById('nowPlaying').textContent = `${channel.name} (Reconnecting ${currentRetryCount}/${maxRetries}...)`;
                        setTimeout(() => {
                            video.load();
                            video.play().catch(()=>{});
                        }, 2000);
                    } else {
                        document.getElementById('loading').classList.remove('show');
                        document.getElementById('errorText').textContent = 'Stream failed. Make sure ffmpeg.exe is in the server folder.';
                        document.getElementById('errorMsg').classList.add('show');
                        document.getElementById('nowPlaying').textContent = 'Stream failed.';
                        document.getElementById('statusDot').className = 'dot';
                    }
                };
                
            } catch (err) {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('errorText').textContent = err.message;
                document.getElementById('errorMsg').classList.add('show');
            }
        }
    </script>
</body>
</html>
